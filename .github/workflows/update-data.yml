name: Update Finance Data

on:
  schedule:
    - cron: '*/15 * * * *'   # каждые 15 минут
  workflow_dispatch:           # кнопка ручного запуска на GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Apps Script
        run: |
          curl -L --max-time 30 \
            "https://script.google.com/macros/s/AKfycbxxS_UCbeAF8E6anFDlFb_3bqw0zIeH1apd3hAj_ZmsiqNOVaZSsrtO4N4UzfjFbph7/exec" \
            -o data.json

      - name: Validate JSON
        run: python3 -c "import json; json.load(open('data.json')); print('JSON valid')"

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update finance data $(date -u +%H:%M)"
          git push
