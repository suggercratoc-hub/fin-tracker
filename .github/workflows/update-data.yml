name: Update Finance Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main

      - name: Fetch data from Apps Script
        run: |
          curl -L --max-time 30 \
            "https://script.google.com/macros/s/AKfycbwAzVb2VDMKwE5jtGAQYaonf9wzXhtKN0VMZiuY1u-sxcXpvnfo60Vd1l6TGXVFtd9Y/exec" \
            -o data.json

      - name: Validate JSON
        run: python3 -c "import json; json.load(open('data.json')); print('JSON valid')"

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update finance data $(date -u +%H:%M)"
          git push
