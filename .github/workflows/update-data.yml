name: Update Finance Data

on:
  repository_dispatch:
    types: [sheets-updated]   # мгновенное обновление при изменении таблицы
  schedule:
    - cron: '*/15 * * * *'   # резервное обновление каждые 15 минут
  workflow_dispatch:           # кнопка ручного запуска на GitHub

# Только один запуск за раз — новый отменяет предыдущий
concurrency:
  group: update-finance-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data from Apps Script
        run: |
          curl -L --max-time 30 \
            "https://script.google.com/macros/s/AKfycbz0cShVa9P4g_AC5YXzv9i774zEcybEoHeDBcBplgGbufzfYuL7an9bsTM8if_K4TnE/exec?nocache=1" \
            -o data.json

      - name: Validate JSON
        run: python3 -c "import json; json.load(open('data.json')); print('JSON valid')"

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update finance data $(date -u +%H:%M)"
          git push
